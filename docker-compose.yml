services:
  db:
    image: mysql:8.4
    container_name: esiee_project_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: project_si_db
      MYSQL_USER: project_user
      MYSQL_PASSWORD: project_pass
      MYSQL_ROOT_PASSWORD: root_pass
      TZ: Europe/Paris
    ports:
      - "3308:3306"
    volumes:
      - db_data_mysql:/var/lib/mysql
    
volumes:
  db_data_mysql: